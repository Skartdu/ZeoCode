spring:
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600
      database: 0
  # session配置
  session:
    timeout: 604800
    redis:
      namespace: spring:session
  profiles:
    active: local
  application:
    name: yu-ai-code-mother-backend
    # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_code_generator
    username: root
    password: yusichen520
mybatis-flex:
  configuration:
    map-underscore-to-camel-case: false
server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 604800
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.ysc.aicodegenerator.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn


